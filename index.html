<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Halı Kesim PRO AI V52 - Canlı & Temiz Başlangıç (Enter Odaklı)</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --p: #27ae60; --bg: #f2f2f7; --blue: #007aff; --red: #ff3b30; --gold: #f39c12; }
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #1c1c1e; }
        .card { background: #fff; padding: 15px; border-radius: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 12px; }
        h2 { margin: 0 0 10px; font-size: 11px; color: #8e8e93; text-transform: uppercase; letter-spacing: 1px; }
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        label { font-size: 11px; font-weight: 600; display: block; margin-bottom: 4px; color: #444; }
        input { width: 100%; padding: 12px; border: 1px solid #d1d1d6; border-radius: 10px; font-size: 16px; box-sizing: border-box; -webkit-appearance: none; }
        
        .ebat-row { display: grid; grid-template-columns: 1fr 1fr 1fr auto; gap: 8px; margin-bottom: 8px; background: #f9f9f9; padding: 12px; border-radius: 10px; border: 1px solid #eee; align-items: end; }
        button { border: none; padding: 16px; border-radius: 12px; font-weight: bold; font-size: 15px; cursor: pointer; transition: background 0.2s, transform 0.1s; width: 100%; -webkit-tap-highlight-color: transparent; }
        button:active { transform: scale(0.98); }
        .add { background: #fff; color: var(--blue); border: 1px solid var(--blue); margin-bottom: 10px; }
        .calc { background: var(--p); color: #fff; margin-bottom: 10px; }
        .print-btn { background: #5856d6; color: #fff; margin-bottom: 10px; font-size: 16px; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .clear { background: #fee2e2; color: var(--red); font-size: 14px; }
        .row-del-btn { background: #fee2e2; color: var(--red); padding: 12px; font-size: 14px; border-radius: 10px; font-weight: bold; height: 46px; width: auto; }
        
        .plan-box { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 11px; font-weight: bold; margin-top: 5px; }
        .yanyana { background: #e8f5e9; color: #2e7d32; border: 1px solid #2e7d32; }
        .tekil-ayari { background: #fff3e0; color: #e65100; border: 1px solid #ffb74d; }
        .fire-badge { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .adet-detay-box { margin-top: 6px; font-size: 13px; color: #1c1c1e; background: #f1f8e9; padding: 8px 12px; border-radius: 8px; border: 1px dashed #81c784; display: block; line-height: 1.4; }
        .adet-badge { background: #27ae60; color: white; padding: 2px 6px; border-radius: 4px; font-weight: bold; font-size: 12px; }
        
        .print-header-info { display: none; margin-bottom: 15px; border-bottom: 2px solid #000; padding-bottom: 10px; }
        .print-header-info table { width: 100%; border: none; }
        .print-header-info td { border: none; padding: 4px; font-size: 14px; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { padding: 12px 4px; border-bottom: 1px solid #eee; vertical-align: top; font-size: 14px; }
        
        .total-box { background: #e3f2fd; border: 2px dashed var(--blue); padding: 15px; border-radius: 12px; text-align: center; margin-top: 15px; }
        .total-box h3 { margin: 0 0 5px 0; color: var(--blue); font-size: 18px; }

        @media print {
            body { background: #fff; padding: 0; color: #000; }
            .card:not(#resCard) { display: none !important; }
            button, .row-del-btn, .clear, .add, .calc, .print-btn { display: none !important; }
            .card { box-shadow: none; padding: 0; margin: 0; }
            .adet-detay-box { border: 1px solid #ccc; background: #fff; }
            .total-box { border: 2px dashed #000; background: #fff; }
            .print-header-info { display: block !important; }
        }
    </style>
</head>
<body>

<div class="card">
    <h2>1. MÜŞTERİ VE KALİTE KARTI</h2>
    <div class="input-group">
        <div><label>Müşteri Ünvanı / Adı</label><input type="text" id="mUnvan" placeholder="Örn: Altınsar"></div>
        <div><label>Halı Kalitesi / Türü</label><input type="text" id="hKalite" placeholder="Örn: Sarar Lüx"></div>
    </div>
</div>

<div class="card">
    <h2>2. RULO VE KESİM PAYI BİLGİLERİ</h2>
    <div class="input-group">
        <div><label>Fiziksel Rulo Eni (cm)</label><input type="number" id="rEn" placeholder="Örn: 310"></div>
        <div><label>Faydalı Kesim Eni (cm)</label><input type="number" id="fEn" placeholder="Örn: 300"></div>
    </div>
</div>

<div class="card">
    <h2>3. REÇETE SİPARİŞ LİSTESİ (MÜŞTERİ TALEPLERİ)</h2>
    <div id="ebatlar"></div>
    <button class="add" type="button" onclick="ekle()">+ Yeni Sipariş Satırı Ekle</button>
    <button class="calc" type="button" onclick="donmasizKombinasyonMotoru()">FİRE ANALİZLİ MATRAJ HESAPLA</button>
    <button class="clear" type="button" onclick="tumSistemiSifirla()">TÜM SAYFAYI SIFIRLA</button>
</div>

<div class="card" id="resCard" style="display:none">
    
    <!-- YAZICI ÇIKTISINDA GÖRÜNECEK ÖZEL BAŞLIK ALANI -->
    <div class="print-header-info" id="yaziciBaslikAlani"></div>

    <h2>4. ÜRETİM KESİM PLANI VE EN FİRESİ RAPORU</h2>
    <table>
        <thead>
            <tr style="text-align: left; color: #8e8e93; font-size: 11px;">
                <th style="padding-bottom: 8px;">DÜZEN VE DETAYLAR</th>
                <th style="padding-bottom: 8px;">YERLEŞİM / FİRE</th>
                <th style="padding-bottom: 8px;">KESİLECEK BOY</th>
            </tr>
        </thead>
        <tbody id="sonuc"></tbody>
    </table>
    <div id="genelToplamAlani"></div>
    <div style="margin-top: 15px;">
        <button class="print-btn" type="button" onclick="window.print()">🖨️ PLANI YAZICIYA GÖNDER / ÇIKTI AL</button>
    </div>
</div>

<script>
window.onload = function() {
    tumSistemiSifirla();
};

function tumSistemiSifirla() {
    document.getElementById("mUnvan").value = "";
    document.getElementById("hKalite").value = "";
    document.getElementById("rEn").value = "";
    document.getElementById("fEn").value = "";
    document.getElementById("ebatlar").innerHTML = "";
    document.getElementById("resCard").style.display = "none";
    document.getElementById("sonuc").innerHTML = "";
    document.getElementById("genelToplamAlani").innerHTML = "";
    ekle("", "", "");
}

function ekle(enValue = "", boyValue = "", adetValue = "") {
    let d = document.getElementById("ebatlar");
    let div = document.createElement("div");
    div.className = "ebat-row";
    div.innerHTML = `
        <div><label>Halı Eni (cm)</label><input type="number" class="en" value="${enValue}" placeholder="Örn: 80" onkeydown="enterKontrol(event, 'en')"></div>
        <div><label>Boyu (Metre)</label><input type="number" step="0.01" class="boy" value="${boyValue}" placeholder="Örn: 1.5" onkeydown="enterKontrol(event, 'boy')"></div>
        <div><label>Sipariş Adedi</label><input type="number" class="adet" value="${adetValue}" placeholder="Örn: 10" onkeydown="enterKontrol(event, 'adet')"></div>
        <div><button class="row-del-btn" type="button" onclick="this.closest('.ebat-row').remove()">Sil</button></div>`;
    d.appendChild(div);
}

// Enter tuşuna basıldığında bir sonraki kutuya ya da yeni satıra geçiş fonksiyonu
function enterKontrol(event, tip) {
    if (event.key === "Enter") {
        event.preventDefault(); // Sayfanın/Formun yenilenmesini engeller
        let currentRow = event.target.closest('.ebat-row');
        
        if (tip === 'en') {
            // En kutusunda enter yapıldıysa aynı satırdaki boy kutusuna geç
            currentRow.querySelector('.boy').focus();
        } else if (tip === 'boy') {
            // Boy kutusunda enter yapıldıysa aynı satırdaki adet kutusuna geç
            currentRow.querySelector('.adet').focus();
        } else if (tip === 'adet') {
            // Adet kutusunda enter yapıldıysa yeni satır ekle ve yeni satırın en kutusuna odaklan
            ekle("", "", "");
            let tumSatirlar = document.querySelectorAll('.ebat-row');
            let yeniSatir = tumSatirlar[tumSatirlar.length - 1];
            yeniSatir.querySelector('.en').focus();
        }
    }
}

function kombinasyonlariUret(ebatlar, maxEn) {
    let sonuclar = [];
    function bul(mevcutKombinasyon, baslangicIndex, mevcutToplam) {
        if (mevcutToplam > 0) { sonuclar.push([...mevcutKombinasyon]); }
        for (let i = baslangicIndex; i < ebatlar.length; i++) {
            if (mevcutToplam + ebatlar[i] <= maxEn) {
                mevcutKombinasyon.push(ebatlar[i]);
                bul(mevcutKombinasyon, i, mevcutToplam + ebatlar[i]);
                mevcutKombinasyon.pop();
            }
        }
    }
    bul([], 0, 0);
    return sonuclar;
}

function donmasizKombinasyonMotoru() {
    let R_EN = parseFloat(document.getElementById("rEn").value);
    let F_EN = parseFloat(document.getElementById("fEn").value);
    let M_UNVAN = document.getElementById("mUnvan").value.trim() || "Belirtilmedi";
    let H_KALITE = document.getElementById("hKalite").value.trim() || "Belirtilmedi";
    
    if (!R_EN || !F_EN) {
        alert("Lütfen önce Fiziksel Rulo Eni ve Faydalı Kesim Eni bilgilerini giriniz!");
        return;
    }

    let rows = document.querySelectorAll(".ebat-row");
    let havuz = {};
    let siparisOrijinalDetaylari = {};
    let benzersizEbatlar = [];
    let veriVarMi = false;
    
    rows.forEach(row => {
        let en = parseFloat(row.querySelector(".en").value);
        let boy = parseFloat(row.querySelector(".boy").value) || 0;
        let adet = parseFloat(row.querySelector(".adet").value) || 0;
        
        if (en > 0 && boy > 0 && adet > 0) {
            let toplamDogrusalMetraj = boy * adet;
            havuz[en] = (havuz[en] || 0) + toplamDogrusalMetraj;
            
            if (!siparisOrijinalDetaylari[en]) siparisOrijinalDetaylari[en] = [];
            siparisOrijinalDetaylari[en].push({ boy: boy, adet: adet, kalanMetraj: toplamDogrusalMetraj });

            if (!benzersizEbatlar.includes(en)) benzersizEbatlar.push(en);
            veriVarMi = true;
        }
    });

    if (!veriVarMi) {
        alert("Lütfen en az bir satıra geçerli ebat ve adet giriniz!");
        return;
    }

    let gununTarihi = new Date().toLocaleDateString('tr-TR');
    document.getElementById("yaziciBaslikAlani").innerHTML = `
        <h2 style="color:#000; text-align:center; margin-bottom:10px; font-size:16px;">FABRİKA DOKUMA VE ÜRETİM KARTIN</h2>
        <table>
            <tr><td><b>Müşteri Ünvanı:</b> <span style="font-size:15px; color:var(--blue); font-weight:bold;">${M_UNVAN}</span></td><td><b>Tarih:</b> ${gununTarihi}</td></tr>
            <tr><td><b>Halı Kalitesi:</b> <span style="font-size:15px; color:var(--blue); font-weight:bold;">${H_KALITE}</span></td><td><b>Tezgah Eni:</b> ${R_EN} cm (${F_EN} cm Faydalı)</td></tr>
        </table>
    `;

    let tumKombiler = kombinasyonlariUret(benzersizEbatlar, F_EN);
    
    let siraliKombiler = tumKombiler.map(kombi => {
        let toplamEn = kombi.reduce((a, b) => a + b, 0);
        let fire = F_EN - toplamEn;
        let sayim = {};
        kombi.forEach(e => { sayim[e] = (sayim[e] || 0) + 1; });
        
        let maxEnIçerik = Math.max(...kombi); 
        return { kombi, fire, sayim, toplamEn, maxEnIçerik };
    }).sort((a, b) => {
        if (a.fire !== b.fire) return a.fire - b.fire;
        return b.maxEnIçerik - a.maxEnIçerik;
    }); 

    let tb = document.getElementById("sonuc");
    tb.innerHTML = "";
    let planlar = [];
    let netToplamBoy = 0;

    let donguLimiti = 0;
    while (donguLimiti < 200) {
        let enIyiKombi = null;
        let maksimumKesimBoyu = 0;

        for (let s of siraliKombiler) {
            if (Object.keys(s.sayim).length === 1 && s.fire > 0) continue;

            let limitBoy = Infinity;
            let kombiGecerli = true;

            for (let ebat in s.sayim) {
                let gerekenAdet = s.sayim[ebat];
                let havuzdakiMetraj = havuz[ebat] || 0;
                if (havuzdakiMetraj < 0.01) {
                    kombiGecerli = false;
                    break;
                }
                let olasiBoy = havuzdakiMetraj / gerekenAdet;
                if (olasiBoy < limitBoy) limitBoy = olasiBoy;
            }

            if (kombiGecerli && limitBoy > 0.01) {
                enIyiKombi = s;
                maksimumKesimBoyu = limitBoy;
                break;
            }
        }

        if (!enIyiKombi || maksimumKesimBoyu <= 0.01) break;

        for (let ebat in enIyiKombi.sayim) {
            havuz[ebat] -= maksimumKesimBoyu * enIyiKombi.sayim[ebat];
        }

        let urunDetaylari = [];
        for (let ebat in enIyiKombi.sayim) {
            let hatSayisi = enIyiKombi.sayim[ebat];
            let buHatIcinToplamUretilenMetraj = maksimumKesimBoyu * hatSayisi;
            
            let listelenenBoylar = siparisOrijinalDetaylari[ebat];
            let harcanacakMetraj = buHatIcinToplamUretilenMetraj;
            
            listelenenBoylar.forEach(sip => {
                if (harcanacakMetraj <= 0.01 || sip.kalanMetraj <= 0.01) return;
                
                let pay = Math.min(harcanacakMetraj, sip.kalanMetraj);
                let adet = Math.round(pay / sip.boy);
                if (adet > 0) {
                    urunDetaylari.push(`• <b>${ebat} cm x ${sip.boy.toFixed(2)} mt</b> Ölçüsünden: <span class="adet-badge">${adet} Adet</span> (Yan yana ${hatSayisi} hat içinde)`);
                    sip.kalanMetraj -= pay;
                    harcanacakMetraj -= pay;
                }
            });
        }

        planlar.push({
            kombinasyon: enIyiKombi.kombi.join(" + ") + " cm Düzeni",
            detay: enIyiKombi.fire === 0 ? "Tam Kusursuz Uyum" : "Dinamik Matris Dağılımı",
            fire: enIyiKombi.fire,
            boy: maksimumKesimBoyu,
            aciklama: `✂️ <b>Hattan Çıkan Net Ürünler:</b><br>${urunDetaylari.join("<br>")}`
        });

        netToplamBoy += maksimumKesimBoyu;
        donguLimiti++;
    }

    for (let ebat in havuz) {
        let kalanMetraj = havuz[ebat];
        if (kalanMetraj > 0.01) {
            let enSafi = parseFloat(ebat);
            let maksSira = Math.floor(F_EN / enSafi);
            if (maksSira < 1) maksSira = 1;

            let ustaKesimBoyu = kalanMetraj / maksSira;
            let fire = F_EN - (enSafi * maksSira);

            let urunDetaylari = [];
            let listelenenBoylar = siparisOrijinalDetaylari[ebat];
            let harcanacakMetraj = kalanMetraj;

            listelenenBoylar.forEach(sip => {
                if (harcanacakMetraj <= 0.01 || sip.kalanMetraj <= 0.01) return;
                let pay = Math.min(harcanacakMetraj, sip.kalanMetraj);
                let adet = Math.round(pay / sip.boy);
                if (adet > 0) {
                    urunDetaylari.push(`• <b>${ebat} cm x ${sip.boy.toFixed(2)} mt</b> Ölçüsünden: <span class="adet-badge">${adet} Adet</span> (Yan yana ${maksSira} hat içinde)`);
                    sip.kalanMetraj -= pay;
                    harcanacakMetraj -= pay;
                }
            });

            let kombiDizilim = [];
            for(let i=0; i<maksSira; i++) kombiDizilim.push(ebat);

            planlar.push({
                kombinasyon: kombiDizilim.join(" + ") + " cm Düzeni",
                detay: "Usta Kalan Ayarı",
                fire: fire,
                boy: ustaKesimBoyu,
                aciklama: `✂️ <b>Kalan Tekil Parçalar Maksimum Hatta Dağıtıldı:</b><br>${urunDetaylari.join("<br>")}`,
                isUsta: true
            });

            netToplamBoy += ustaKesimBoyu;
            havuz[ebat] = 0;
        }
    }

    planlar.forEach((p, idx) => {
        let borderStyle = p.isUsta 
            ? `border-left: 5px solid var(--gold); background: #fffde7;`
            : `border-left: 5px solid ${['#007aff','#5856d6','#27ae60','#f39c12'][idx % 4]};`;
        
        let planTipiSınıfı = p.isUsta ? "plan-box tekil-ayari" : "plan-box yanyana";
        let fireMetni = p.fire > 0 ? `⚠️ Kenar Firesi: ${p.fire} cm` : "✅ En Firesi: 0 cm (Sıfır Fire)";
        
        tb.innerHTML += `
        <tr style="${borderStyle}">
            <td style="padding: 12px 4px;">
                <b style="font-size:16px">${p.kombinasyon}</b>
                <div class="adet-detay-box">${p.aciklama}</div>
            </td>
            <td style="padding: 12px 4px;">
                <div class="${planTipiSınıfı}">${p.detay}</div><br>
                <span class="fire-badge">${fireMetni}</span>
            </td>
            <td style="padding: 12px 4px;"><b style="color:var(--blue); font-size:16px">${p.boy.toFixed(2)} mt</b></td>
        </tr>`;
    });

    let yuvarlanmisToplam = Math.ceil(netToplamBoy);
    let fabrikaRuloBoyu = Math.ceil(yuvarlanmisToplam / 50) * 50;

    let toplamDiv = document.getElementById("genelToplamAlani");
    toplamDiv.innerHTML = `
        <div class="total-box">
            <h3>🎯 DOKUMA FABRİKASI SİPARİŞ KARTI (V52)</h3>
            <p>Müşteri Ünvanı: <b style="font-size:16px; color:var(--blue);">${M_UNVAN}</b> | Kalite: <b style="font-size:16px; color:var(--blue);">${H_KALITE}</b></p>
            <p>Müşteri Siparişleri İçin Gerekli Net Dokuma: <b>${netToplamBoy.toFixed(2)} metre</b> (Yuvarlatılmış: ${yuvarlanmisToplam} mt)</p>
            <p style="font-size:16px; color:#155724; background:#d4edda; padding:14px; border-radius:10px; font-weight:bold; margin-top:10px;">
                Üretim Tezgah Ayarı: <br> Tezgah Eni: ${R_EN} cm | Toplam Çözgü Boyu: ${fabrikaRuloBoyu} metre
            </p>
        </div>`;

    document.getElementById("resCard").style.display = "block";
    document.getElementById("resCard").scrollIntoView({behavior: "smooth"});
}
</script>
</body>
</html>
