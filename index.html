<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Halı Kesim PRO AI V20</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        :root { --p: #27ae60; --bg: #f2f2f7; --blue: #007aff; --red: #ff3b30; --gold: #f39c12; --purple: #5856d6; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; color: #1c1c1e; }
        .card { background: #fff; padding: 15px; border-radius: 14px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 12px; }
        h2 { margin: 0 0 10px; font-size: 11px; color: #8e8e93; text-transform: uppercase; letter-spacing: 1px; }
        .input-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        label { font-size: 11px; font-weight: 600; display: block; margin-bottom: 4px; color: #444; }
        input { width: 100%; padding: 12px; border: 1px solid #d1d1d6; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
        .ebat-row { display: grid; grid-template-columns: 1.2fr 1.2fr 1fr; gap: 8px; margin-bottom: 8px; background: #f9f9f9; padding: 10px; border-radius: 10px; border: 1px solid #eee; }
        button { border: none; padding: 16px; border-radius: 12px; font-weight: bold; font-size: 15px; cursor: pointer; transition: 0.2s; width: 100%; }
        .add { background: #fff; color: var(--blue); border: 1px solid var(--blue); margin-bottom: 10px; }
        .calc { background: var(--p); color: #fff; margin-bottom: 10px; }
        .clear { background: #fee2e2; color: var(--red); font-size: 14px; }
        
        /* Gelişmiş Öneri Butonları */
        .oneri-box { background: #fff9e6; border: 1px solid var(--gold); border-radius: 10px; padding: 12px; margin-top: 10px; }
        .oneri-grid { display: grid; grid-template-columns: 1fr; gap: 8px; margin-top: 8px; }
        .oneri-btn { background: #fff; border: 1px solid var(--gold); padding: 12px; border-radius: 8px; text-align: left; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .oneri-btn:active { transform: scale(0.98); background: #fef5d1; }
        .oneri-info b { color: #1c1c1e; font-size: 14px; }
        .fire-badge { font-size: 10px; padding: 3px 6px; border-radius: 4px; font-weight: bold; }
        .f-zero { background: #d4edda; color: #155724; }
        .f-low { background: #fff3cd; color: #856404; }

        .plan-box { display: inline-block; padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: bold; margin-top: 5px; }
        .yanyana { background: #e8f5e9; color: #2e7d32; border: 1px solid #2e7d32; }
        .teksira { background: #fff3e0; color: #e65100; border: 1px solid #e65100; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        td { padding: 12px 4px; border-bottom: 1px solid #eee; vertical-align: top; font-size: 13px; }
        .locked { background: #f0f0f0 !important; color: #aaa; }
    </style>
</head>
<body>

<div class="card">
    <h2>1. RULO BİLGİLERİ</h2>
    <div class="input-group">
        <div><label>Rulo Eni (cm)</label><input type="number" id="rEn" placeholder="Örn: 300" oninput="onerileriGuncelle()"></div>
        <div><label>Rulo Max Boy (m)</label><input type="number" id="rBoy" placeholder="Örn: 30"></div>
    </div>
    
    <div id="oneriAlani" class="oneri-box" style="display:none">
        <h2 style="color:#935116; margin-bottom:5px">💡 İDEAL KOMBİNASYONLAR (Tıklayıp Ekle)</h2>
        <div id="oneriListesi" class="oneri-grid"></div>
    </div>
</div>

<div class="card">
    <h2>2. SİPARİŞ LİSTESİ</h2>
    <div id="ebatlar"></div>
    <button class="add" onclick="ekle()">+ Boş Satır Ekle</button>
    <button class="calc" onclick="genelHesapla()">HESAPLAMAYI BAŞLAT</button>
    <button class="clear" onclick="location.reload()">SAYFAYI SIFIRLA</button>
</div>

<div class="card" id="resCard" style="display:none">
    <h2>3. ANALİZ SONUÇLARI</h2>
    <table><tbody id="sonuc"></tbody></table>
</div>

<script>
const standartEnler = [60, 80, 100, 120, 150, 200, 250];

window.onload = () => ekle();

function onerileriGuncelle() {
    let rEn = parseFloat(document.getElementById("rEn").value);
    let oneriAlani = document.getElementById("oneriAlani");
    let oneriListesi = document.getElementById("oneriListesi");
    
    if(!rEn || rEn < 40) { oneriAlani.style.display = "none"; return; }
    oneriAlani.style.display = "block";

    let komb = [];

    // Gelişmiş Rekürsif Kombinasyon Bulucu
    function bul(hedef, liste, suankiToplam) {
        if (suankiToplam <= hedef && suankiToplam > hedef - 21) {
            komb.push({dizi: [...liste], fire: hedef - suankiToplam});
        }
        if (suankiToplam >= hedef || liste.length >= 4) return;

        for (let i = 0; i < standartEnler.length; i++) {
            if (suankiToplam + standartEnler[i] <= hedef) {
                bul(hedef, [...liste, standartEnler[i]], suankiToplam + standartEnler[i]);
            }
        }
    }

    bul(rEn, [], 0);

    // Eşsiz ve en iyi kombinasyonları filtrele
    let uniqueMap = new Map();
    komb.forEach(x => {
        let key = x.dizi.sort((a,b) => b-a).join('+');
        if (!uniqueMap.has(key) || uniqueMap.get(key).fire > x.fire) {
            uniqueMap.set(key, x);
        }
    });

    let siraliKomb = Array.from(uniqueMap.values()).sort((a,b) => a.fire - b.fire);

    oneriListesi.innerHTML = siraliKomb.slice(0, 10).map(x => `
        <div class="oneri-btn" onclick="kombinasyonEkle('${x.dizi.join(',')}')">
            <div class="oneri-info">
                <b>${x.dizi.join(' + ')} cm</b>
            </div>
            <div class="fire-badge ${x.fire === 0 ? 'f-zero' : 'f-low'}">
                ${x.fire === 0 ? 'TAM UYUM' : x.fire + ' cm Fire'}
            </div>
        </div>
    `).join("");
}

function kombinasyonEkle(diziStr) {
    let ebatlar = diziStr.split(',');
    ebatlar.forEach(en => ekle(en));
    document.getElementById("ebatlar").lastElementChild.scrollIntoView({behavior: "smooth"});
}

function adetKontrol(el) {
    let row = el.closest('.ebat-row');
    let adetInput = row.querySelector('.adet');
    if(parseFloat(el.value) > 5) {
        adetInput.value = ""; 
        adetInput.disabled = true;
        adetInput.classList.add('locked');
        adetInput.placeholder = "Rulo";
    } else {
        adetInput.disabled = false;
        adetInput.classList.remove('locked');
        adetInput.placeholder = "Adet";
    }
}

function ekle(enValue = "") {
    let d = document.getElementById("ebatlar");
    let div = document.createElement("div");
    div.className = "ebat-row";
    div.innerHTML = `
        <div><label>En (cm)</label><input type="number" class="en" value="${enValue}" placeholder="En"></div>
        <div><label>Boy (m)</label><input type="number" class="boy" placeholder="Boy" oninput="adetKontrol(this)"></div>
        <div><label>Adet</label><input type="number" class="adet" placeholder="Adet"></div>`;
    d.appendChild(div);
}

function genelHesapla() {
    let R_EN = parseFloat(document.getElementById("rEn").value);
    let R_MAX = parseFloat(document.getElementById("rBoy").value);
    if(!R_EN) { alert("Rulo Enini girin!"); return; }

    let rows = document.querySelectorAll(".ebat-row");
    let tb = document.getElementById("sonuc");
    tb.innerHTML = "";
    let hasData = false;

    rows.forEach((row, index) => {
        let e = parseFloat(row.querySelector(".en").value);
        let b = parseFloat(row.querySelector(".boy").value);
        let a = parseFloat(row.querySelector(".adet").value) || 1;

        if(e > 0 && b > 0) {
            hasData = true;
            let isRulo = b > 5;
            let yanYana = Math.floor(R_EN / e);
            let netAdet = isRulo ? 1 : a;
            let siraSayisi = Math.ceil(netAdet / yanYana);
            let toplamM = siraSayisi * b;
            
            let rowStyle = `border-left: 5px solid ${['#007aff','#5856d6','#f39c12','#27ae60'][index%4]}`;

            tb.innerHTML += `
            <tr style="${rowStyle}">
                <td><b>${e}x${b*100} cm</b><br><small>${isRulo ? 'Rulo' : a + ' Adet'}</small></td>
                <td><div class="plan-box ${yanYana > 1 && !isRulo ? 'yanyana' : 'teksira'}">${(isRulo || yanYana === 1) ? 'TEK SIRA' : yanYana + ' YAN YANA'}</div></td>
                <td><b style="color:var(--blue)">${toplamM.toFixed(2)} m</b><br><small style="color:green">${((e*b*netAdet)/100).toFixed(2)} m²</small></td>
            </tr>`;
        }
    });

    if(hasData) {
        document.getElementById("resCard").style.display = "block";
        document.getElementById("resCard").scrollIntoView({behavior: "smooth"});
    }
}
</script>
</body>
</html>
